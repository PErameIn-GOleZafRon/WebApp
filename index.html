<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NDCTBcoin farm</title>
    <link rel="stylesheet" href="style.css">
    <audio id="clickSound" src="click.mp3"></audio>
    <audio id="menuSound" src="menu.mp3"></audio>
</head>
<body>
    <div class="container">
        <h1>NDCTBcoin farm</h1>
        <div id="balance-container">
            <span>Баланс: </span><span id="balance">0</span>
        </div>
        <div id="content">
            <div id="clicker-container" class="tab-content active">
                <img src="clicker.png" id="clicker" alt="Clicker">
            </div>
            <div id="upgrade-container" class="tab-content">
                <h2>Улучшения</h2>
                <button id="upgrade-click" data-cost="50">Улучшить клик (50)</button>
                <button id="upgrade-passive" data-cost="500">Пассивный доход (500)</button>
                <button id="upgrade-crit" data-cost="1000">Критический удар (1000)</button>
            </div>
            
            <div id="market-container" class="tab-content">
                <h2>Биржа (Pivo Inc.)</h2>
                <div class="market-card">
                    <div class="stock-info">
                        <span id="stock-name">Акции Pivo</span>
                        <span id="stock-price">Цена: 100</span>
                        <span id="stock-trend" class="">+0%</span>
                    </div>
                    
                    <canvas id="stock-chart" width="300" height="100"></canvas>
                    
                    <div class="stock-owned">У вас: <span id="my-stocks">0</span> шт.</div>
                    
                    <div class="market-input-group">
                        <input type="number" id="buy-amount" value="1" min="1" placeholder="Количество" />
                    </div>
                    
                    <div class="market-controls">
                        <button id="buy-stock">Купить за 100</button>
                        <button id="sell-stock">Продать всё</button>
                    </div>
                </div>
                <p style="font-size: 0.7em; color: #666; margin-top: 10px;">Цена меняется каждые 5 секунд (50 - 200)</p>
            </div>

            <div id="friends-container" class="tab-content">
                <h2>Друзья</h2>
                <p>Coming Soon</p>
            </div>
            <div id="stats-container" class="tab-content">
                <h2>Статистика</h2>
                <div class="stat-item"><span>Всего тапов:</span><span id="stat-total-clicks">0</span></div>
                <div class="stat-item"><span>Заработано всего:</span><span id="stat-total-earned">0</span></div>
                <div class="stat-item"><span>Сила клика:</span><span id="stat-click-power">0</span></div>
                <div class="stat-item"><span>Доход в сек:</span><span id="stat-passive-rate">0</span></div>
                <div class="stat-item"><span>Шанс крита:</span><span id="stat-crit-chance">0%</span></div>
            </div>
        </div>
        <div id="league-container">
            <h2>Лиги</h2>
            <div id="league-progress"><div id="league-bar"></div></div>
            <span id="league">1 лига (x1.0)</span>
        </div>
        <div id="tabs">
            <button id="clicker-tab" class="tab active">Клики</button>
            <button id="upgrade-tab" class="tab">Улучшения</button>
            <button id="market-tab" class="tab">Биржа</button>
            <button id="friends-tab" class="tab">Друзья</button>
            <button id="stats-tab" class="tab">Статистика</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
